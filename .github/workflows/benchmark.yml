name: Query Benchmark

on:
  workflow_dispatch:
    inputs:
      base_branch:
        description: "Base branch (reference)"
        required: true
        type: string
        default: "main"
      compare_branch:
        description: "Branch to compare against base"
        required: true
        type: string

# Only run one benchmark at a time per base+compare pair
concurrency:
  group: benchmark-${{ github.event.inputs.base_branch }}-${{ github.event.inputs.compare_branch }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # Run benchmarks on the base branch
  # -------------------------------------------------------------------------
  benchmark-base:
    name: Benchmark (${{ github.event.inputs.base_branch }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.base_branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
        working-directory: packages/web

      - name: Run benchmark
        run: node scripts/run-benchmark.js
        working-directory: packages/web
        env:
          GITHUB_SHA: ${{ github.sha }}
          BENCHMARK_BRANCH: ${{ github.event.inputs.base_branch }}

      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-base
          path: packages/web/benchmark-results-*.json
          retention-days: 7

  # -------------------------------------------------------------------------
  # Run benchmarks on the compare branch
  # -------------------------------------------------------------------------
  benchmark-compare:
    name: Benchmark (${{ github.event.inputs.compare_branch }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.compare_branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
        working-directory: packages/web

      - name: Run benchmark
        run: node scripts/run-benchmark.js
        working-directory: packages/web
        env:
          GITHUB_SHA: ${{ github.sha }}
          BENCHMARK_BRANCH: ${{ github.event.inputs.compare_branch }}

      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-compare
          path: packages/web/benchmark-results-*.json
          retention-days: 7

  # -------------------------------------------------------------------------
  # Compare results and post a workflow summary
  # -------------------------------------------------------------------------
  compare:
    name: Compare results
    runs-on: ubuntu-latest
    needs: [benchmark-base, benchmark-compare]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: benchmark-base
          path: ./artifacts/base

      - uses: actions/download-artifact@v4
        with:
          name: benchmark-compare
          path: ./artifacts/compare

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate comparison
        run: |
          BASE_FILE=$(ls ./artifacts/base/benchmark-results-*.json | head -1)
          COMPARE_FILE=$(ls ./artifacts/compare/benchmark-results-*.json | head -1)
          COMMENT=$(node packages/web/scripts/compare-results.js "$BASE_FILE" "$COMPARE_FILE")
          echo "$COMMENT" >> "$GITHUB_STEP_SUMMARY"
